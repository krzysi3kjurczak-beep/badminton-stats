<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1419">
  <style>
    #boot-cover{background:#0f1419;position:fixed;inset:0;z-index:100000;display:flex;align-items:center;justify-content:center}
    #boot-cover[hidden]{display:none}
    #boot-cover img{width:min(168px,44vw);height:auto}
  </style>
  <meta name="description" content="Statystyki meczów badmintonowych">
  <title>Badminton App</title>
  <link rel="manifest" href="manifest.json?v=244">
  <link rel="icon" href="favicon.ico?v=244" sizes="any">
  <link rel="icon" href="icons/icon-32.png?v=244" type="image/png" sizes="32x32">
  <link rel="icon" href="icons/icon-16.png?v=244" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="icons/icon-180.png?v=244">
  <link rel="stylesheet" href="css/styles.css?v=299">
</head>
<body>
  <div id="boot-cover" class="boot-cover" aria-hidden="true">
    <img class="boot-cover__logo" src="icons/logo-hero.png?v=244" width="168" height="168" alt="">
  </div>
  <div id="app" class="app--booting">
    <header class="top-bar">
      <div class="top-bar__brand">
        <img class="top-bar__logo" src="icons/logo-mark.png?v=244" width="40" height="40" alt="Badminton App">
        <div class="top-bar__titles">
          <span class="top-bar__app-name">Badminton App</span>
          <span class="top-bar__subtitle" id="page-subtitle">Statystyki</span>
        </div>
      </div>
      <div class="top-bar__actions">
        <button class="top-bar__notif-btn" id="notif-center-btn" type="button" aria-label="Powiadomienia" hidden>
          <span class="top-bar__notif-icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></span>
          <span class="top-bar__notif-badge" id="notif-center-badge" hidden>0</span>
        </button>
        <button class="top-bar__avatar-btn" id="profile-btn" type="button" aria-label="Panel użytkownika">
          <span class="top-bar__avatar" id="header-avatar"></span>
        </button>
      </div>
    </header>

    <input type="file" id="avatar-input" accept="image/*" hidden>
    <input type="file" id="team-avatar-input" accept="image/*" hidden>

    <main class="content" id="content"></main>

    <aside class="pwa-install" id="pwa-install" hidden>
      <div class="pwa-install__icon" aria-hidden="true">
        <img src="icons/logo-mark.png?v=244" width="40" height="40" alt="">
      </div>
      <div class="pwa-install__text">
        <strong class="pwa-install__title">Zainstaluj aplikację</strong>
        <span class="pwa-install__sub">Szybki dostęp z ekranu głównego</span>
      </div>
      <button class="pwa-install__btn btn btn--primary" id="pwa-install-btn" type="button">Zainstaluj</button>
      <button class="pwa-install__close" id="pwa-install-close" type="button" aria-label="Zamknij">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </aside>

    <nav class="bottom-nav" aria-label="Główna nawigacja">
      <button class="bottom-nav__item bottom-nav__item--active" data-tab="stats" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V10M10 20V4M16 20v-6M22 20V8"/></svg>
        <span>Statystyki</span>
      </button>
      <button class="bottom-nav__item" data-tab="matches" type="button">
        <span class="bottom-nav__icon bottom-nav__icon--matches" aria-hidden="true"></span>
        <span>Mecze</span>
      </button>
      <button class="bottom-nav__item" data-tab="players" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>Zawodnicy i drużyny</span>
      </button>
    </nav>

    <div class="fab-anchor" id="fab-anchor">
      <div class="fab-menu" id="fab-menu" hidden>
        <button class="fab-menu__item fab-menu__item--invite" data-action="fab-invite-account" type="button">
          <span class="fab-menu__thumb" aria-hidden="true"><img src="icons/logo-mark.png?v=254" width="44" height="44" alt=""></span>
          <span class="fab-menu__text">
            <span class="fab-menu__label">Zaproś nowego gracza</span>
            <span class="fab-menu__sub">Link do rejestracji w lidze</span>
          </span>
        </button>
        <button class="fab-menu__item" data-action="fab-add-guest" type="button">
          <span class="fab-menu__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></span>
          <span class="fab-menu__label">Dodaj gracza gościa</span>
        </button>
      </div>
      <button class="fab" id="fab" type="button" aria-label="Dodaj" aria-expanded="false" aria-haspopup="menu">
        <svg class="fab__icon fab__icon--plus" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        <svg class="fab__icon fab__icon--close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
  </div>

  <script src="js/config.js?v=299"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/cloud.js?v=299"></script>
  <script src="js/push.js?v=299"></script>
  <script src="js/app.js?v=299"></script>
  <script>
    const APP_CACHE_VER = '299';
    if ('caches' in window) {
      caches.keys().then(keys => keys
        .filter(k => k.startsWith('badminton-stats-') && k !== 'badminton-stats-v' + APP_CACHE_VER)
        .forEach(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const swUrl = 'sw.js?v=' + APP_CACHE_VER;
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.update());
        const waiting = regs.map(r => r.waiting).find(Boolean);
        if (waiting) waiting.postMessage({ type: 'SKIP_WAITING' });
      });
      navigator.serviceWorker.register(swUrl).catch(() => {});
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
