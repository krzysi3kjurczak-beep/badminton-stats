<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1419">
  <meta name="description" content="Statystyki meczów badmintonowych">
  <title>Badminton App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="top-bar__brand">
        <img class="top-bar__logo" src="icons/logo.svg" width="40" height="40" alt="">
        <div class="top-bar__titles">
          <span class="top-bar__app-name">Badminton App</span>
          <span class="top-bar__subtitle" id="page-subtitle">Statystyki</span>
        </div>
      </div>
      <button class="top-bar__avatar-btn" id="profile-btn" type="button" aria-label="Panel użytkownika">
        <span class="top-bar__avatar" id="header-avatar"></span>
      </button>
    </header>

    <input type="file" id="avatar-input" accept="image/*" hidden>
    <input type="file" id="team-avatar-input" accept="image/*" hidden>

    <main class="content" id="content"></main>

    <nav class="bottom-nav" aria-label="Główna nawigacja">
      <button class="bottom-nav__item bottom-nav__item--active" data-tab="stats" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20V10M10 20V4M16 20v-6M22 20V8"/></svg>
        <span>Statystyki</span>
      </button>
      <button class="bottom-nav__item" data-tab="matches" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <ellipse cx="9.5" cy="11" rx="5" ry="6.5" transform="rotate(-30 9.5 11)"/>
          <path d="M12.5 15.5l3.5 5.5"/>
          <circle cx="18.5" cy="5.5" r="1.25" fill="currentColor" stroke="none"/>
          <path d="M18.5 6.75v2.5M17 7.75l3 1M17 9.25l3-1"/>
        </svg>
        <span>Mecze</span>
      </button>
      <button class="bottom-nav__item" data-tab="players" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>Zawodnicy</span>
      </button>
    </nav>

    <button class="fab" id="fab" type="button" aria-label="Dodaj">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/cloud.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
